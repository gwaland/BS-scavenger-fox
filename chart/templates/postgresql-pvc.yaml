{{- if and .Values.postgresql.enabled .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "scavenger-fox.postgresql.fullname" . }}
  labels:
    {{- include "scavenger-fox.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.postgresql.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
  {{- with .Values.postgresql.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "scavenger-fox.fullname" . }}
  labels:
    {{- include "scavenger-fox.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "scavenger-fox.selectorLabels" . | nindent 4 }}

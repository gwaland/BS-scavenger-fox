{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "scavenger-fox.fullname" . }}-seed
  labels:
    {{- include "scavenger-fox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "scavenger-fox.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - npm
            - run
            - db:seed
          env:
            - name: NODE_ENV
              value: {{ .Values.app.env.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.app.env.port | quote }}
            - name: ASSET_STORAGE_PATH
              value: {{ .Values.app.env.assetStoragePath | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "scavenger-fox.database.secretName" . }}
                  key: {{ include "scavenger-fox.database.urlKey" . }}
            - name: PHOTO_REVIEW_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "scavenger-fox.appSecrets.secretName" . }}
                  key: {{ include "scavenger-fox.appSecrets.photoReviewTokenKey" . }}
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "scavenger-fox.appSecrets.secretName" . }}
                  key: {{ include "scavenger-fox.appSecrets.adminApiTokenKey" . }}
{{- end }}

{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "scavenger-fox.fullname" . }}-migrate
  labels:
    {{- include "scavenger-fox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "scavenger-fox.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - ./node_modules/.bin/drizzle-kit
            - migrate
          env:
            - name: NODE_ENV
              value: {{ .Values.app.env.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.app.env.port | quote }}
            - name: ASSET_STORAGE_PATH
              value: {{ .Values.app.env.assetStoragePath | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "scavenger-fox.database.secretName" . }}
                  key: {{ include "scavenger-fox.database.urlKey" . }}
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "scavenger-fox.appSecrets.secretName" . }}
                  key: {{ include "scavenger-fox.appSecrets.adminApiTokenKey" . }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}

{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "scavenger-fox.fullname" . }}
  labels:
    {{- include "scavenger-fox.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "scavenger-fox.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress:
    {{- if .Values.networkPolicy.egress.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.postgres.podSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.postgres.port }}
    {{- end }}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}

replicaCount: 1

image:
  repository: ghcr.io/gwaland/fox-central-command-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: fcc.bluestripes.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fcc-bluestripes-net-tls
      hosts:
        - fcc.bluestripes.net

app:
  env:
    nodeEnv: production
    port: 3000
    assetStoragePath: /app/data/assets

secrets:
  existingSecret: fcc-app-secrets
  photoReviewTokenKey: PHOTO_REVIEW_TOKEN
  adminApiTokenKey: ADMIN_API_TOKEN

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: scavenger_fox
    password: change-me-postgres-password
    database: scavenger_fox
  service:
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  existingSecret: fcc-database
  urlKey: DATABASE_URL

assetsPersistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

migrationJob:
  enabled: true

seed:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

networkPolicy:
  enabled: true
  ingressCIDRs:
    - 10.42.0.0/16
    - 10.9.0.0/24
  egress:
    postgres:
      enabled: true
      port: 5432
      # POC-only: lock this down once the external PostgreSQL endpoint is known.
      cidrs:
        - 0.0.0.0/0

nodeSelector: {}
tolerations: []
affinity: {}

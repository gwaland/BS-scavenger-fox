replicaCount: 1

image:
  repository: ghcr.io/gwaland/fox-central-command-backend
  pullPolicy: Always
  tag: "21fb975669c60f1134bb3be0820dca9f52bd0b27"

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: fcc.bluestripes.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fcc-bluestripes-net-tls
      hosts:
        - fcc.bluestripes.net

app:
  env:
    nodeEnv: production
    port: 3000
    assetStoragePath: /app/data/assets
    adminPublicBaseUrl: https://fcc.bluestripes.net/admin
    adminAllowedOrigins: https://fcc.bluestripes.net

secrets:
  existingSecret: fcc-app-secrets
  adminApiTokenKey: ADMIN_API_TOKEN

database:
  existingSecret: fcc-database
  urlKey: DATABASE_URL

assetsPersistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

migrationJob:
  enabled: true

seed:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

networkPolicy:
  enabled: true
  ingressCIDRs:
    - 10.42.0.0/16
    - 10.9.0.0/24
  egress:
    postgres:
      enabled: true
      port: 5432
      podSelector:
        app.kubernetes.io/name: fcc-postgres
        app.kubernetes.io/instance: fcc-postgres

nodeSelector: {}
tolerations: []
affinity: {}

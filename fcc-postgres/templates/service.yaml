apiVersion: v1
kind: Service
metadata:
  name: {{ include "fcc-postgres.fullname" . }}
  labels:
    {{- include "fcc-postgres.labels" . | nindent 4 }}
spec:
  ports:
    - name: postgresql
      port: {{ .Values.service.port }}
      targetPort: postgresql
  selector:
    {{- include "fcc-postgres.selectorLabels" . | nindent 4 }}
